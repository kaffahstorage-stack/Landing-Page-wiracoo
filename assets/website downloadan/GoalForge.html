<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>GoalForge</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f8ff}
.sidebar{position:fixed;left:0;top:0;width:220px;height:100%;background:#0b57d0;color:#fff;padding:20px;box-sizing:border-box}
.sidebar a{display:block;color:#fff;text-decoration:none;padding:10px;margin:5px 0}
.main{margin-left:220px;padding:20px}
.card{background:#fff;border-radius:12px;padding:16px;margin:10px 0;box-shadow:0 2px 10px rgba(0,0,0,.08)}
input,textarea{width:100%;padding:10px;margin:5px 0}
button{padding:10px 14px;background:#0b57d0;color:#fff;border:none;border-radius:8px;cursor:pointer}
.progress{height:10px;background:#ddd;border-radius:20px;overflow:hidden}
.bar{height:100%;background:#0b57d0}
.hidden{display:none}
</style>
</head>
<body>
<div class="sidebar">
<h2>GoalForge</h2>
<a href="#" onclick="show('dashboard')">Dashboard</a>
<a href="#" onclick="show('goals')">Goals</a>
<a href="#" onclick="show('habits')">Habits</a>
<a href="#" onclick="show('journal')">Journal</a>
<a href="#" onclick="show('progress')">Progress</a>
<a href="#" onclick="show('settings')">Settings</a>
</div>

<div class="main">
<section id="dashboard">
<div class="card"><h2>Dashboard</h2><div id="stats"></div></div>
</section>

<section id="goals" class="hidden">
<div class="card">
<h2>Goals</h2>
<input id="gname" placeholder="Nama Goal">
<input id="gtarget" type="number" placeholder="Target">
<input id="gprogress" type="number" placeholder="Progress">
<button onclick="addGoal()">Tambah Goal</button>
<div id="goalList"></div>
</div>
</section>

<section id="habits" class="hidden">
<div class="card">
<h2>Habits</h2>
<input id="hname" placeholder="Nama Habit">
<button onclick="addHabit()">Tambah Habit</button>
<div id="habitList"></div>
</div>
</section>

<section id="journal" class="hidden">
<div class="card">
<h2>Journal</h2>
<input id="jtitle" placeholder="Judul">
<textarea id="jcontent"></textarea>
<button onclick="addJournal()">Tambah Catatan</button>
<div id="journalList"></div>
</div>
</section>

<section id="progress" class="hidden">
<div class="card">
<canvas id="chart"></canvas>
</div>
</section>

<section id="settings" class="hidden">
<div class="card">
<h2>Settings</h2>
<input id="username" placeholder="Nama Pengguna">
<button onclick="saveUser()">Simpan</button>
<button onclick="upgrade()">Upgrade Premium</button>
<button onclick="resetAll()">Reset Data</button>
</div>
</section>
</div>

<script>
let goals=JSON.parse(localStorage.getItem('goals')||'[]');
let habits=JSON.parse(localStorage.getItem('habits')||'[]');
let journals=JSON.parse(localStorage.getItem('journals')||'[]');
let premium=JSON.parse(localStorage.getItem('premium')||'false');

function save(){
localStorage.setItem('goals',JSON.stringify(goals));
localStorage.setItem('habits',JSON.stringify(habits));
localStorage.setItem('journals',JSON.stringify(journals));
renderAll();
}

function show(id){
document.querySelectorAll('section').forEach(s=>s.classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
}

function addGoal(){
if(!premium && goals.length>=3){alert('Batas gratis 3 goal');return;}
goals.push({
name:gname.value,
target:+gtarget.value,
progress:+gprogress.value
});
save();
}

function addHabit(){
if(!premium && habits.length>=5){alert('Batas gratis 5 habit');return;}
habits.push({name:hname.value,done:false});
save();
}

function addJournal(){
journals.push({
title:jtitle.value,
content:jcontent.value,
date:new Date().toLocaleDateString()
});
save();
}

function renderGoals(){
goalList.innerHTML='';
goals.forEach((g,i)=>{
let p=Math.min(100,(g.progress/g.target)*100||0);
goalList.innerHTML+=`
<div class="card">
<b>${g.name}</b>
<p>${g.progress}/${g.target}</p>
<div class="progress"><div class="bar" style="width:${p}%"></div></div>
<button onclick="goals.splice(${i},1);save()">Hapus</button>
</div>`;
});
}

function renderHabits(){
habitList.innerHTML='';
habits.forEach((h,i)=>{
habitList.innerHTML+=`
<div class="card">
${h.name}
<button onclick="habits[${i}].done=!habits[${i}].done;save()">${h.done?'Selesai':'Tandai'}</button>
<button onclick="habits.splice(${i},1);save()">Hapus</button>
</div>`;
});
}

function renderJournal(){
journalList.innerHTML='';
journals.forEach((j,i)=>{
journalList.innerHTML+=`
<div class="card">
<h3>${j.title}</h3>
<p>${j.content}</p>
<small>${j.date}</small><br>
<button onclick="journals.splice(${i},1);save()">Hapus</button>
</div>`;
});
}

function renderStats(){
let done=goals.filter(g=>g.progress>=g.target).length;
stats.innerHTML=`
<p>Total Goal: ${goals.length}</p>
<p>Goal Selesai: ${done}</p>
<p>Habit Aktif: ${habits.length}</p>
<p>Premium: ${premium?'Ya':'Tidak'}</p>`;
}

let chart;
function renderChart(){
let ctx=document.getElementById('chart');
if(chart) chart.destroy();
chart=new Chart(ctx,{
type:'bar',
data:{
labels:goals.map(g=>g.name),
datasets:[{label:'Goal Progress',data:goals.map(g=>g.progress)}]
}
});
}

function renderAll(){
renderGoals();
renderHabits();
renderJournal();
renderStats();
renderChart();
}

function upgrade(){
premium=true;
localStorage.setItem('premium','true');
alert('Premium aktif');
renderStats();
}

function saveUser(){
localStorage.setItem('username',username.value);
}

function resetAll(){
localStorage.clear();
location.reload();
}

renderAll();
</script>
</body>
</html>
